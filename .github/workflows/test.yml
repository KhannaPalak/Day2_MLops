name: MLOps Day 2 CI
on:
    push:
        branches:
            - master

jobs:
    run-training:
        runs-on: ubuntu-latest

        steps:
          - name: Fetch Code
            uses: actions/checkout@v4

          - name: Setup Python
            uses: actions/setup-python@v5
            with:
                python-version: '3.10'

          - name: Install Dependencies
            run: pip install -r requirements.txt

          - name: Run training Script
            env:
               MLFLOW_ALLOW_FILE_STORE: "true"

            run: python train.py